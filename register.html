
<form action="/submit" method="POST">

     <!-- Personal Details -->
    <label for="fullname">Full Name:</label>
    <input type="text" id="fullname" name="fullname" placeholder="Enter full name" required><br><br>

    <label for="username">Username:</label>
    <input type="text" id="username" name="username" placeholder="Enter username" required><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" placeholder="Enter password" required><br><br>

    <label for="confirm_password">Confirm Password:</label>
    <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required><br><br>


    <!-- Terms -->
    <input type="checkbox" id="terms" name="terms" required>
    <label for="terms">I agree to the Terms & Conditions</label><br><br>

    <!-- Submit -->
    <button type="submit">Register</button>

</form>
